name: Build Guardian Times

on:
  schedule:
    # The edition publishes at ~07:30 AM IST — that first slot is the one that matters.
    # GitHub's FREE scheduler is best-effort: it often runs crons late, and on a quiet
    # day can drop one entirely (it skipped 22 Jun once). So every later slot is a
    # SILENT FALLBACK spread across the morning — if an earlier one is late or dropped,
    # a later one still lands today's edition. The guard step below makes this safe:
    # once today's edition exists, every remaining trigger detects it and does nothing,
    # so the Gemini quota is spent exactly ONCE per day no matter how many slots fire.
    # (For punctual 07:30 delivery, an external cron-job.org → repository_dispatch is
    # the reliable trigger; these crons are the zero-setup backup.)
    - cron: '30 1 * * *'    # 07:00 IST  (the daily edition)
    - cron: '50 1 * * *'    # 07:20 IST  (fallback, if 7:00 was late/dropped)
    - cron: '20 2 * * *'    # 07:50 IST  (fallback)
    - cron: '0 4 * * *'     # 09:30 IST  (fallback)
    - cron: '30 6 * * *'    # 12:00 IST  (fallback)
    - cron: '0 8 * * *'     # 13:30 IST  (last-chance fallback)
  # PRIMARY reliable trigger: an external cron service (e.g. cron-job.org) hits the
  # GitHub API at 07:30 IST sharp and fires this. GitHub's own scheduler is best-
  # effort and runs cron HOURS LATE (or skips it), so the crons above are just free
  # backups. The guard step below dedupes them all — whoever runs first that morning
  # builds; the rest skip. See repo notes for the one-time cron-job.org + token setup.
  repository_dispatch:
    types: [daily-build]
  workflow_dispatch:         # manual "Run workflow" button in the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: guardian-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Once-per-day guard. The external cron service (repository_dispatch) is the
      # primary trigger; GitHub's own schedules are flaky backups. Whichever fires
      # FIRST that morning builds today's edition; any later automatic trigger
      # detects it and SKIPS — so the free Gemini quota is only ever spent ONCE.
      # It compares the date stamped in public/health.json (written by the last
      # successful build) against today's UTC date. A manual workflow_dispatch
      # ALWAYS rebuilds (skip=false) so you can force a refresh.
      - name: Guard — has today's edition already been built?
        id: guard
        run: |
          today="$(date -u +'%Y-%m-%d')"
          built="$(node -e "try{process.stdout.write((require('./public/health.json').ts||'').slice(0,10))}catch{process.stdout.write('')}" 2>/dev/null || echo '')"
          echo "today=$today  last-built=$built  event=${{ github.event_name }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$built" = "$today" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅ Today's edition ($today) already exists — skipping rebuild to protect the Gemini quota."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci || npm install

      - name: Build edition
        if: steps.guard.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-pro
          GEMINI_TTS_VOICE: Gacrux   # mature anchor voice
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}   # Fund Manager Interviews search
        run: npm run build

      - name: Commit edition + dedup state
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "guardian-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/ archive/ || true
          git commit -m "edition: $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git push || echo "nothing to push"

      # Upload + deploy run on EVERY trigger (not just fresh builds). On a "skip" run
      # the checkout already holds today's committed edition, so re-uploading + re-
      # deploying it is a cheap, idempotent RETRY — if the morning deploy hit a
      # transient GitHub Pages error, a later backup slot simply publishes it again.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
