name: Build Guardian Times

on:
  schedule:
    # ONCE daily at 07:00 IST. Cron is UTC. Single run = the whole free-tier
    # daily Gemini quota goes to one richer edition instead of being split
    # across two starved runs (the ~13:30 IST reset meant both old runs shared
    # one quota window). 07:00 IST = a pre-market briefing with overnight global news.
    - cron: '30 1 * * *'    # 07:00 IST  (daily edition)
  workflow_dispatch:         # manual "Run workflow" button in the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: guardian-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build edition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: npm run build

      - name: Commit edition + dedup state
        run: |
          git config user.name "guardian-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/ archive/ || true
          git commit -m "edition: $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git push || echo "nothing to push"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
