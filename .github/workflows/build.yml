name: Build Guardian Times

on:
  schedule:
    # The edition publishes at 07:00 AM IST. That is the only run that matters.
    # The two later times are SILENT FALLBACKS: GitHub's free scheduler sometimes
    # drops a cron entirely, so if the 7am slot is skipped, the next one catches
    # it. The guard step below makes this safe — once today's edition exists, the
    # fallbacks detect it and do nothing, so the Gemini quota is spent only ONCE.
    - cron: '0 2 * * *'     # 07:30 IST  (the daily edition)
    - cron: '45 2 * * *'    # 08:15 IST  (silent fallback, only if 7:30 was late/dropped)
    - cron: '45 3 * * *'    # 09:15 IST  (silent fallback, only if both above missed)
  # PRIMARY reliable trigger: an external cron service (e.g. cron-job.org) hits the
  # GitHub API at 07:30 IST sharp and fires this. GitHub's own scheduler is best-
  # effort and runs cron HOURS LATE (or skips it), so the crons above are just free
  # backups. The guard step below dedupes them all — whoever runs first that morning
  # builds; the rest skip. See repo notes for the one-time cron-job.org + token setup.
  repository_dispatch:
    types: [daily-build]
  workflow_dispatch:         # manual "Run workflow" button in the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: guardian-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Once-per-day guard. The external cron service (repository_dispatch) is the
      # primary trigger; GitHub's own schedules are flaky backups. Whichever fires
      # FIRST that morning builds today's edition; any later automatic trigger
      # detects it and SKIPS — so the free Gemini quota is only ever spent ONCE.
      # It compares the date stamped in public/health.json (written by the last
      # successful build) against today's UTC date. A manual workflow_dispatch
      # ALWAYS rebuilds (skip=false) so you can force a refresh.
      - name: Guard — has today's edition already been built?
        id: guard
        run: |
          today="$(date -u +'%Y-%m-%d')"
          built="$(node -e "try{process.stdout.write((require('./public/health.json').ts||'').slice(0,10))}catch{process.stdout.write('')}" 2>/dev/null || echo '')"
          echo "today=$today  last-built=$built  event=${{ github.event_name }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$built" = "$today" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅ Today's edition ($today) already exists — skipping rebuild to protect the Gemini quota."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci || npm install

      - name: Build edition
        if: steps.guard.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: npm run build

      - name: Commit edition + dedup state
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "guardian-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/ archive/ || true
          git commit -m "edition: $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git push || echo "nothing to push"

      - name: Upload Pages artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
